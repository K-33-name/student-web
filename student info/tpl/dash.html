<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="dashboard">

<div class="profile">
<h2>👤 {{ user[1] }}</h2>
<p>Student</p>
</div>

<div class="details">
<h3>Profile Details</h3>

<p><b>Email:</b> {{ user[2] }}</p>
<p><b>University:</b> {{ user[3] }}</p>
<p><b>Class:</b> {{ user[4] }}</p>
<p><b>Age:</b> {{ user[5] }}</p>
<p><b>Mobile:</b> {{ user[6] }}</p>

<a href="/out">Logout</a>
</div>

</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
